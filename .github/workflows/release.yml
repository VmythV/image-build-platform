name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

env:
  VERSION: ${{ github.ref_type == 'tag' && github.ref_name || inputs.version }}

jobs:
  binary-release:
    name: Binary Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        run: npm --prefix web ci

      - name: Build Linux release archives
        run: |
          TARGET_OS=linux TARGET_ARCH=amd64 bash scripts/release.sh
          BUILD_WEB=false TARGET_OS=linux TARGET_ARCH=arm64 bash scripts/release.sh

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh release view "${VERSION}" >/dev/null 2>&1; then
            gh release upload "${VERSION}" dist/release/*.tar.gz dist/release/*.checksums.txt --clobber
          else
            gh release create "${VERSION}" dist/release/*.tar.gz dist/release/*.checksums.txt \
              --target "${GITHUB_SHA}" \
              --title "${VERSION}" \
              --generate-notes
          fi

  docker-release:
    name: GHCR Image
    runs-on: ubuntu-latest
    needs: binary-release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare image metadata
        id: image
        run: |
          set -euo pipefail
          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          short_sha="${GITHUB_SHA::7}"
          tags="${image}:${VERSION},${image}:sha-${short_sha}"
          if [[ "${VERSION}" != *-* ]]; then
            tags="${tags},${image}:latest"
          fi
          echo "name=${image}" >> "${GITHUB_OUTPUT}"
          echo "tags=${tags}" >> "${GITHUB_OUTPUT}"

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.image.outputs.tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ env.VERSION }}
          build-args: |
            VERSION=${{ env.VERSION }}
