name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NPM_CONFIG_REGISTRY: https://registry.npmjs.org/

jobs:
  test:
    name: Test And Build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: ibp
          POSTGRES_USER: ibp
          POSTGRES_PASSWORD: ibp-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ibp -d ibp"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        run: npm --prefix web ci

      - name: Run tests
        run: make test

      - name: Run PostgreSQL smoke test
        env:
          IBP_TEST_POSTGRES_DSN: postgres://ibp:ibp-password@localhost:5432/ibp?sslmode=disable
        run: GO111MODULE=on go test ./internal/server -run TestPostgresSmoke -count=1

      - name: Build application
        run: make build

      - name: Run backup restore smoke test
        run: bash scripts/smoke-backup-restore.sh

  compose:
    name: Compose Config
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate compose files
        run: |
          docker compose -f docker-compose.yml config >/dev/null
          docker compose -f docker-compose.postgres.yml config >/dev/null
          docker compose -f deploy/compose/sqlite.yml config >/dev/null
          docker compose -f deploy/compose/postgres.yml config >/dev/null

  release-package:
    name: Release Package Smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        run: npm --prefix web ci

      - name: Build release package
        run: |
          version="ci-${GITHUB_SHA::7}"
          make release VERSION="${version}"

      - name: Verify release package
        run: bash scripts/check-release-package.sh dist/release/*.tar.gz

      - name: Upload release smoke artifact
        uses: actions/upload-artifact@v6
        with:
          name: release-package-smoke
          path: |
            dist/release/*.tar.gz
            dist/release/*.checksums.txt
          if-no-files-found: error
          retention-days: 7

  docker-build:
    name: Docker Build Smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          platforms: linux/amd64
          build-args: |
            VERSION=ci-${{ github.sha }}
