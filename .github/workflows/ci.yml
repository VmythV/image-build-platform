name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NPM_CONFIG_REGISTRY: https://registry.npmjs.org/

jobs:
  test:
    name: Test And Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        run: npm --prefix web ci

      - name: Run tests
        run: make test

      - name: Build application
        run: make build

  compose:
    name: Compose Config
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate compose files
        run: |
          docker compose -f docker-compose.yml config >/dev/null
          docker compose -f docker-compose.postgres.yml config >/dev/null
          docker compose -f deploy/compose/sqlite.yml config >/dev/null
          docker compose -f deploy/compose/postgres.yml config >/dev/null

  release-package:
    name: Release Package Smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        run: npm --prefix web ci

      - name: Build release package
        run: |
          version="ci-${GITHUB_SHA::7}"
          make release VERSION="${version}"

      - name: Upload release smoke artifact
        uses: actions/upload-artifact@v6
        with:
          name: release-package-smoke
          path: |
            dist/release/*.tar.gz
            dist/release/*.checksums.txt
          if-no-files-found: error
          retention-days: 7

  docker-build:
    name: Docker Build Smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          platforms: linux/amd64
          build-args: |
            VERSION=ci-${{ github.sha }}
